# ===========================
# ComplyIQ - Full Stack Docker Compose
# ===========================
# Deploy: docker-compose up -d
# Logs: docker-compose logs -f
# Stop: docker-compose down

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: complyiq-postgres
    environment:
      POSTGRES_USER: complyiq
      POSTGRES_PASSWORD: SecurePass2026!
      POSTGRES_DB: complyiq_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complyiq -d complyiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - complyiq-network

  # Redis for caching, rate limiting, and Celery broker
  redis:
    image: redis:7-alpine
    container_name: complyiq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass RedisPass2026!
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - complyiq-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complyiq-backend
    environment:
      - DATABASE_URL=postgresql://complyiq:SecurePass2026!@postgres:5432/complyiq_db
      - REDIS_URL=redis://:RedisPass2026!@redis:6379/0
      - CELERY_BROKER_URL=redis://:RedisPass2026!@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:RedisPass2026!@redis:6379/2
      - SECRET_KEY=dev-secret-key-min-32-chars-required-2026
      - DEBUG=False
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - complyiq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker (async task processing)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complyiq-celery-worker
    environment:
      - DATABASE_URL=postgresql://complyiq:SecurePass2026!@postgres:5432/complyiq_db
      - REDIS_URL=redis://:RedisPass2026!@redis:6379/0
      - CELERY_BROKER_URL=redis://:RedisPass2026!@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:RedisPass2026!@redis:6379/2
      - SECRET_KEY=dev-secret-key-min-32-chars-required-2026
      - DEBUG=False
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    networks:
      - complyiq-network

  # Celery Flower (task monitoring UI)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: complyiq-flower
    environment:
      - CELERY_BROKER_URL=redis://:RedisPass2026!@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:RedisPass2026!@redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
    command: celery -A app.tasks flower --port=5555
    networks:
      - complyiq-network

volumes:
  postgres_data:
  redis_data:

networks:
  complyiq-network:
    driver: bridge
