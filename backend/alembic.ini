"""
Alembic configuration file for ComplyIQ backend.

This file is the Alembic configuration template used to generate
migration scripts.
"""

from alembic import config as alembic_config

# Configuration object used to provide the values for the template
# environment when rendering alembic/**/script.py.mako

config = alembic_config.Config()

# set the location of the migration files the alembic migration environment
# will use the locations here to place migration files
# and source from when it runs migration command
fileattrs = ['sqlalchemy.url', 'script_location']

# Logging configuration
# A couple of examples for filters which will apply log settings

if config.config_file_name is not None:
    # the main rfile is used here
    import logging
    from logging.config import fileConfig as loggingFileConfig

    loggingFileConfig(config.config_file_name)
    logger = logging.getLogger('alembic.env')
